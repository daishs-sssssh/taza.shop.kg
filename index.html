<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAZA SHOP - Ош Филиалдары</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f7f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .header {
            background-color: white;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00acc1;
            margin-bottom: 15px;
        }

        h1 { font-size: 22px; color: #006064; margin: 10px 0; }
        .subtitle { color: #546e7a; font-size: 12px; font-weight: bold; }

        .branch-card {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 18px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #e0f2f1;
        }

        .branch-card:active {
            transform: scale(0.98);
        }

        .info { text-align: left; }
        .city { font-size: 10px; color: #00acc1; text-transform: uppercase; font-weight: 700; display: block; }
        .address { font-weight: bold; font-size: 14px; color: #37474f; display: block; margin: 2px 0; }
        
        .schedule { 
            font-size: 12px; 
            color: #2e7d32;
            font-weight: 500;
        }

        .wa-icon {
            width: 40px;
            height: 40px;
            background-color: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wa-icon img { width: 22px; filter: brightness(0) invert(1); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="logo.jpg" onerror="this.style.display='none'" alt="TAZA SHOP" class="logo-img">
            <h1>TAZA SHOP</h1>
            <p class="subtitle">КОСМЕТИКА • МЫЛОМОЙКА • МАРКЕТ</p>
        </div>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="city">Ош шаары</span>
                <span class="address">📍 ул. Муминовой 17</span>
                <span class="schedule">🕔 09:00 - 22:00</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="city">Ош шаары (Араванский)</span>
                <span class="address">📍 Анар, Абдыкадыровой 217</span>
                <span class="schedule" style="color: #d32f2f;">🕔 09:00 - 23:00</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="city">Ош шаары</span>
                <span class="address">📍 Курманжан Датка 80</span>
                <span class="schedule">🕔 09:00 - 22:00</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>
    </div>

    <p style="color: #90a4ae; font-size: 11px; margin-top: 20px;">Taza Shop Osh • 2026</p>

</body>
</html>
