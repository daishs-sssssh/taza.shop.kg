<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таза Шоп - Магазиндер тармагы</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top, #e0f7fa 0%, #ffffff 70%, #f1f8e9 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #263238;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .header {
            margin-top: 30px;
            margin-bottom: 40px;
        }

        /* Логотиптин фону билинбеши үчүн жумшак квадрат стиль */
        .logo-box {
            width: 140px;
            height: 140px;
            background: white; 
            border-radius: 30px; /* Тегерек эмес, жумшак бурчтуу квадрат */
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 15px 35px rgba(0, 172, 193, 0.15);
            padding: 10px;
            border: 1px solid rgba(0, 172, 193, 0.1);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Сүрөттү баштапкы формасында сактайт */
        }

        h1 { 
            font-size: 24px; 
            font-weight: 700;
            color: #007c91; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
        }

        .subtitle { 
            color: #546e7a; 
            font-size: 11px; 
            font-weight: 600; 
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .branch-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            margin-bottom: 15px;
            border-radius: 25px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 1px solid white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
        }

        .branch-card:active {
            transform: scale(0.96);
        }

        .info { text-align: left; }
        .area-tag { font-size: 10px; color: #00acc1; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; display: block; }
        .address { font-weight: 700; font-size: 16px; color: #37474f; display: block; }
        .schedule { font-size: 12px; color: #2e7d32; margin-top: 6px; font-weight: 600; display: flex; align-items: center; }

        .wa-icon {
            width: 45px;
            height: 45px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }

        .wa-icon img { width: 24px; filter: brightness(0) invert(1); }
        .footer-text { color: #90a4ae; font-size: 10px; margin-top: 50px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-box">
                <img src="logo.jpg" onerror="this.src='https://via.placeholder.com/140?text=TAZA+SHOP'" alt="Таза Шоп" class="logo-img">
            </div>
            <h1>Таза Шоп магазини</h1>
            <p class="subtitle">Косметика жана жуучу каражаттар</p>
        </div>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="area-tag">Ош шаары • Араванская</span>
                <span class="address">📍 Муминова 13</span>
                <span class="schedule">🕒 09:00дөн 23:00гө чейин</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="area-tag">Ош шаары • Анар кичи району</span>
                <span class="address">📍 Абдыкадыров 217</span>
                <span class="schedule">🕒 09:00дөн 23:00гө чейин</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="area-tag">Ош шаары • Фрунзенский</span>
                <span class="address">📍 Курманжан Датка 80</span>
                <span class="schedule">🕒 09:00дөн 22:00гө чейин</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>
    </div>

    <p class="footer-text">Премиум Сапат • Таза Шоп 2026</p>

</body>
</html>
