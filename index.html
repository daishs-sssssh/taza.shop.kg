<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAZA SHOP - Премиум Дүкөндөр Тармагы</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
    /* Башка стилдер ошол бойдон калат... */

    .logo-wrapper {
        width: 130px;
        height: 130px;
        background: white; /* Сүрөттүн ак фону менен биригип кетет */
        border-radius: 50%; /* Тегерек кылат */
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        box-shadow: 0 10px 30px rgba(0, 172, 193, 0.2);
        overflow: hidden; /* Сүрөттүн четтерин тегерек кылып кесет */
        border: 4px solid white; /* Сүрөт менен четтин ортосунда боштук калтырат */
    }

    .logo-img {
        width: 100%; /* Сүрөт толугу менен тегеректин ичин толтурат */
        height: 100%;
        object-fit: contain; /* Сүрөт кысылбай, таза көрүнөт */
    }
</style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-container">
                <img src="logo.jpg" onerror="this.src='https://via.placeholder.com/120?text=TAZA'" alt="TAZA SHOP" class="logo-img">
            </div>
            <h1>Таза Шоп</h1>
            <p class="subtitle">Косметика жана жуучу каражаттар</p>
        </div>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="area-tag">Ош шаары • Араванская</span>
                <span class="address">📍 Муминова 13</span>
                <span class="schedule">🕒 09:00дөн 23:00гө чейин</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="area-tag">Ош шаары • Анар кичи району</span>
                <span class="address">📍 Абдыкадыров 217</span>
                <span class="schedule">🕒 09:00дөн 23:00гө чейин</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="area-tag">Ош шаары • Фрунзенский</span>
                <span class="address">📍 Курманжан Датка 80</span>
                <span class="schedule">🕒 09:00дөн 22:00гө чейин</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            </div>
        </a>
    </div>

    <p class="footer-text">Premium Quality • Taza Shop 2026</p>

</body>
</html>
